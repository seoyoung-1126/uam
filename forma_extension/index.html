<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>UAM AI Optimizer Extension</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://googleapis.com" rel="stylesheet">

    <script src="https://autodeskforma.com"></script>

    <style>
        :root {
            --bg: #1c1c1c;
            --surface: #2d2d2d;
            --border: #444;
            --accent: #0696d7;
            --accent-hover: #057ab0;
            --success: #00e676;
            --text: #e2e8f0;
            --muted: #9ca3af;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            height: 100vh;
            overflow-y: auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }

        header h1 span {
            color: var(--accent);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(230, 50, 50, 0.1);
            color: #ff4a4a;
            border: 1px solid rgba(230, 50, 50, 0.3);
        }

        .status-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4a4a;
            box-shadow: 0 0 8px #ff4a4a;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-success {
            background: var(--success);
            color: #000;
        }

        .input-box {
            width: 100%;
            height: 60px;
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 8px;
        }

        .input-box:focus {
            border-color: var(--accent);
        }
    </style>
</head>

<body>

    <header>
        <h1>UAM <span>AI Optimizer</span></h1>
        <div class="status-badge" id="status-badge-ui">
            <div class="dot"></div> 연동 대기중
        </div>
    </header>

    <div class="card" id="sdk-panel">
        <div class="card-title">1. 데이터 추출 (Forma -> AI)</div>
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.4;">
            현재 3D 뷰포트의 매스와 풍환경(Wind) 데이터를 Forma SDK를 통해 추출합니다.
        </div>
        <button class="btn" id="load-btn">🔄 실시간 지형/바람 데이터 로드</button>
    </div>

    <div class="card">
        <div class="card-title">2. 생성형 디자인 (Gemini AI)</div>
        <textarea class="input-box" id="prompt-area" placeholder="예: 바람이 부드럽게 넘어가도록 모서리를 많이 깎아줘..."></textarea>
        <!-- [UI 매핑] 제미나이 요청 버튼에 ID를 부여했습니다 -->
        <button class="btn" id="gemini-btn" style="background: linear-gradient(135deg, #7000ff, #00e5ff); color: #fff;">
            ✨ Gemini AI 최적화 요청
        </button>
    </div>

    <!-- 3단계 영역에 나중에 코드가 찍히도록 미리 ID 타겟팅을 해둡니다 -->
    <div class="card" id="step3-card" style="opacity: 0.5;">
        <div class="card-title">3. 매스 갱신 (DaaS)</div>
        <button class="btn" id="daas-btn" disabled>☁️ Dynamo as a Service 구동 대기</button>
    </div>

    <script type="module">
        console.log("UAM AI Optimizer 스크립트 모듈 초기화 중...");

        // 1. 오토데스크 공식 문서에서 안내하는 '쌩 HTML용' ESM 직수입 주소 (/auto 경로 필수)
        import { Forma } from "https://esm.sh/forma-embedded-view-sdk/auto";

        console.log("🚀 오토데스크 모듈 직수입 완료!", Forma);

        const badge = document.getElementById('status-badge-ui');
        badge.style.background = 'rgba(0, 230, 118, 0.1)';
        badge.style.color = 'var(--success)';
        badge.style.borderColor = 'rgba(0, 230, 118, 0.3)';
        badge.innerHTML = '<div class="dot" style="background: var(--success); box-shadow: 0 0 8px var(--success);"></div> Forma SDK 연동';

        let extractedFormaData = null;
        const loadBtn = document.getElementById('load-btn');
        const geminiBtn = document.getElementById('gemini-btn');

        // --- [1단계] 데이터 추출 버튼 ---
        loadBtn.addEventListener('click', async () => {
            try {
                loadBtn.innerText = '데이터 추출 중... ⏳';

                if (!Forma) {
                    throw new Error("Forma 모듈이 로드되지 않았습니다.");
                }

                // 서영님 가이드에 맞춘 동기식(await 없는) 호출
                const projectId = Forma.getProjectId();
                
                // 직수입한 Forma 객체에서 직접 추출 (geometry가 아닌 selection API 사용)
                const selectedPaths = await Forma.selection.getSelection();

                if (!selectedPaths || selectedPaths.length === 0) {
                    alert(`✅ Forma 객체 연결 상태 완벽! (ID: ${projectId})\n\n3D 뷰포트에서 매스 건물을 '클릭'하여 하이라이트한 뒤 버튼을 다시 눌러주세요.`);
                    loadBtn.innerText = '🔄 실시간 지형/바람 데이터 로드';
                    return;
                }

                const massGeometry = await Forma.geometry.getTriangles({ path: selectedPaths[0] });

                extractedFormaData = {
                    projectId: projectId,
                    buildingPath: selectedPaths[0],
                    geometryPoints: massGeometry
                };

                console.log("데이터 추출 버퍼 적재 완료:", extractedFormaData);
                alert("🎉 1단계 성공! 3D 건물 좌표 구조를 확보했습니다.\n이제 2단계 Gemini 최적화 요청을 실행할 수 있습니다.");

                loadBtn.className = 'btn btn-success';
                loadBtn.innerText = '데이터 로드 완료 (0.4s)';
            } catch (error) {
                console.error("추출 에러:", error);
                alert("에러가 발생했습니다: " + error.message);
                loadBtn.innerText = '🔄 실시간 지형/바람 데이터 로드';
            }
        });

            // --- [2단계] Gemini AI 최적화 요청 ---
            geminiBtn.addEventListener('click', async () => {
                if (!extractedFormaData) {
                    alert("1단계의 '실시간 지형/바람 데이터 로드'를 먼저 진행해 주세요!");
                    return;
                }

                const userPrompt = document.getElementById('prompt-area').value;
                geminiBtn.innerText = '인공지능 연산 중... 🤖';
                geminiBtn.style.background = '#444';

                try {
                    console.log("Gemini AI API 호출 프로세스 시동...");
                    // [보안 필수] GitHub 배포를 위해 하드코딩된 API 키를 삭제하고 사용자 프롬프트로 받습니다.
                    let GEMINI_API_KEY = window.localStorage.getItem('gemini_api_key');
                    if (!GEMINI_API_KEY) {
                        GEMINI_API_KEY = prompt("Google Gemini API 키를 입력해주세요.\n(입력하신 키는 브라우저에만 안전하게 임시 저장됩니다)");
                        if (!GEMINI_API_KEY) throw new Error("API 키 입력이 취소되었습니다.");
                        window.localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
                    }

                    // 2026년 최신 구글 API 공식 명칭인 gemini-2.5-flash 로 호출합니다!
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `당신은 세계 최고의 UAM 버티포트 B.I.M 설계자입니다.\n사용자의 설계 컨셉: "${userPrompt}"\n현재 Forma 3D 매스 좌표 일부: ${JSON.stringify(extractedFormaData.geometryPoints.slice(0, 5))}\n위 컨셉과 공기역학을 반영하여, 다이나모(Dynamo as a Service)에서 매스를 생성할 때 사용할 이상적인 수치 4가지(폭, 깊이, 높이, 유선형 모서리 반경)를 JSON 형태로만 제안해 주세요.`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const geminiText = data.candidates[0].content.parts[0].text;
                    console.log("🌟 제미나이 응답 결과:\n", geminiText);
                    alert("제미나이 설계 연산 완료! 콘솔 창에 제안된 최적화 치수가 도착했습니다.");

                    const step3 = document.getElementById('step3-card');
                    step3.style.opacity = '1';
                    
                    const daasBtn = document.getElementById('daas-btn');
                    daasBtn.disabled = false;
                    daasBtn.innerText = '☁️ Dynamo DaaS로 모델 갱신하기';
                    daasBtn.className = 'btn btn-success';

                    geminiBtn.innerText = '✨ AI 최적화 완료';
                    geminiBtn.style.background = 'linear-gradient(135deg, #00e676, #00b0ff)';

                    // --- [3단계] Dynamo DaaS 연동 기능 주입 ---
                    daasBtn.onclick = async () => {
                        try {
                            daasBtn.innerText = '전송 중... 🚀';
                            
                            // 1. 제미나이 텍스트(마크다운 포함)에서 순수 JSON 부분만 정규식으로 추출
                            const jsonMatch = geminiText.match(/\{[\s\S]*\}/);
                            if (!jsonMatch) throw new Error("제미나이 결과에서 JSON 수치를 찾을 수 없습니다.");
                            const optimizedData = JSON.parse(jsonMatch[0]);

                            // 2. 제미나이의 변덕스러운 JSON 키(한글/영문 띄어쓰기 섞임)에 대비한 철벽 파싱 함수
                            const getVal = (jsonObj, keywords) => {
                                for(let k of keywords) {
                                    for(let jKey in jsonObj) {
                                        if(jKey.toLowerCase().includes(k)) return parseFloat(jsonObj[jKey]);
                                    }
                                }
                                return 10.0; // 파싱 실패 시 최소 기본값 보장
                            };

                            const payload = {
                                status: "optimizing",
                                params: {
                                    width: getVal(optimizedData, ["width", "폭"]),
                                    depth: getVal(optimizedData, ["depth", "깊이"]),
                                    height: getVal(optimizedData, ["height", "높이"]),
                                    corner_radius: getVal(optimizedData, ["corner_radius", "radius", "반경"])
                                }
                            };

                            // 3. 브라우저의 악명 높은 CORS 프리플라이트를 강제 패스하는 no-cors 무대포 전송!
                            await fetch('http://localhost:8080/api/dynamo/next_params', {
                                method: 'POST',
                                mode: 'no-cors',
                                headers: { 'Content-Type': 'text/plain' },
                                body: JSON.stringify(payload)
                            });

                            // no-cors 모드에서는 res.ok 응답을 읽을 수 없으므로 무조건 성공으로 간주합니다.
                            alert("✅ 다이나모 로컬 서버로 최적화 수치가 강제 전송되었습니다!\n이제 Revit에서 Dynamo 스크립트를 한 번 '실행'하시면 유선형 매스가 자동으로 갱신됩니다.");
                            daasBtn.innerText = '☁️ Dynamo 전송 완료';
                        } catch (err) {
                            console.error(err);
                            alert("전송 실패: " + err.message + "\n(로컬 Flask/Node 중계 서버가 현재 실행 중인지 터미널을 확인하세요.)");
                            daasBtn.innerText = '☁️ Dynamo DaaS로 모델 갱신하기';
                        }
                    };

                } catch (err) {
                    console.error("Gemini API 통신 에러:", err);
                    alert("제미나이 API 호출 중 에러가 발생했습니다. (콘솔 확인)");
                    geminiBtn.innerText = '✨ Gemini AI 최적화 요청';
                    geminiBtn.style.background = 'linear-gradient(135deg, #7000ff, #00e5ff)';
                }
        });
    </script>
</body>
</html>
